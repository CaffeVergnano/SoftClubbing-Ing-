<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Personas Quiz</title>

  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background-image: url("https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/refs/heads/main/sfondo.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: Black 
}

.app {
  width: 100%;
  max-width: 820px;
  background: rgba(255, 250, 246, 0.85); /* Colore del box con trasparenza */
  border-radius: 24px;
  padding: 32px;
  box-shadow: 0 20px 50px rgba(59, 36, 23, 0.15);
}

.title {
  font-size: 2rem;
  margin-bottom: 10px;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  color: #6a4a3a; 
  margin-bottom: 28px;
  line-height: 1.5;
  font-family: 'Poppins', sans-serif;
}

.email-box {
  display: grid;
  gap: 14px;
}

.email-input {
  width: 100%;
  border: 1px solid #e0cbbb;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 1rem;
  color: #3b2417;
  background: #fff;
}

.privacy-label {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.9rem;
  line-height: 1.4;
  color: #6a4a3a;
}

.start-btn,
.answer-btn,
.restart-btn {
  border: none;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.25s ease;
}

.start-btn,
.restart-btn {
  background: #6f4e37;
  color: white;
  width: 100%;
}

.start-btn:hover,
.restart-btn:hover {
  background: #5b3f2c;
  transform: translateY(-2px);
}

.progress-wrap {
  margin-bottom: 24px;
}

.progress-text {
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: #6a4a3a;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ead9cc;
  border-radius: 999px;
  overflow: hidden;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #6f4e37, #b57b55);
  transition: width 0.3s ease;
}

.question {
  font-size: 1.4rem;
  margin-bottom: 22px;
  line-height: 1.4;
}

.answers {
  display: grid;
  gap: 14px;
}

.answer-btn {
  background: #f3e6dc;
  color: #3b2417;
  text-align: left;
}

.answer-btn:hover {
  background: #e8d2c1;
  transform: translateY(-2px);
}

.result-badge {
  display: inline-block;
  margin-bottom: 16px;
  padding: 8px 14px;
  border-radius: 999px;
  background: #f0dfd2;
  color: #6f4e37;
  font-weight: bold;
}

.result-title {
  font-size: 2rem;
  margin-bottom: 16px;
}

.result-description {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #5c4033;
  margin-bottom: 24px;
  white-space: pre-line;
  text-align: left;
}

.result-image {
  width: 100%;
  max-width: 200px;
  margin-bottom: 16px;
}

.error-message {
  color: #9b2c2c;
  font-size: 0.9rem;
  text-align: center;
}

.footer-note {
  margin-top: 20px;
  text-align: center;
  font-size: 0.9rem;
  color: #7b6253;
}

@media (max-width: 640px) {
  .app {
    padding: 24px 18px;
  }

  .title {
    font-size: 1.7rem;
  }

  .question {
    font-size: 1.2rem;
  }

  .result-title {
    font-size: 1.6rem;
  }

  .result-description {
    font-size: 0.98rem;
  }
}
  </style>
</head>

<body>
  <div class="app">
    <h1 class="title">Coffee Personas</h1>
    <p class="subtitle">
     Enter your email, answer the 5 questions, and discover which coffee persona you are.
    </p>

    <div id="email-step">
      <div class="email-box">
        <input
          type="email"
          id="user-email"
          class="email-input"
          placeholder="Inserisci la tua email"
        />

       <div class="privacy-box">
  <p>Pursuant to Articles 6–8 of Regulation (EU) 2016/679</p>

  <label class="privacy-label">
    <input type="checkbox" id="marketing-check" />
    <span>
    I authorize the processing of my personal data for the promotion and sale of products and services, 
    the sending of commercial information, marketing activities, and the measurement of customer satisfaction.
    </span>
  </label>

  <label class="privacy-label">
    <input type="checkbox" id="profiling-check" />
    <span>
      I authorize the profiling of activities and specific interests related to the communications sent,
      in order to provide targeted commercial offers and analysis reports.
    </span>
  </label>

  <p class="privacy-small">
To read the full privacy notice on marketing activities
    <a href="https://vergnano1882.sharepoint.com/:w:/r/Shared%20Documents/informativa%20attivit%C3%A0%20di%20marketing.docx?d=w419fd2e5fd8e4fb292bc37df55b0ca2f&csf=1&web=1&e=aUnSCa" target="_blank">
      clicca qui
    </a>.
  </p>
</div>

        <button class="start-btn" onclick="startQuiz()">Inizia il quiz</button>
        <p id="email-error" class="error-message"></p>
      </div>
    </div>

    <div id="quiz-container" style="display: none;"></div>
  </div>

  <script>
  const GOOGLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbz593S16u5dnmg-LD37KmelT_MKuXzhq8tmkAOXKRJH_GjuSBrXgQ3Uwv7hLle5ERqT/exec";

  const questions = [
    {
      question: "How do you start your day?",
      answers: [
        { text: "The alarm goes off and I’m instantly active, no waiting around.", type: "ER" },
        { text: "Slowly, maybe chatting or waiting for the next alarm to snooze.", type: "CS" },
        { text: "I plan everything; I want to perform at my best.", type: "MP" },
        { text: "Slow and mindful, with a nice breakfast waiting for me.", type: "DZ" },
        { text: "I haven’t stopped since the night before.", type: "EM" }
      ]
    },
    {
      question: "Scegli una vibe musicale",
      answers: [
        { text: "Rock", type: "ER" },
        { text: "Reggaeton e Latin", type: "CS" },
        { text: "Pop e Contemporanea", type: "MP" },
        { text: "Indie", type: "DZ" },
        { text: "Musica Elettronica", type: "EM" }
      ]
    },
    {
      question: "Cosa cerchi dal tuo caffè?",
      answers: [
        { text: "Energia immediata", type: "ER" },
        { text: "Ritualità sociale", type: "CS" },
        { text: "Gusto deciso e sapori forti", type: "MP" },
        { text: "Un momento di relax", type: "DZ" },
        { text: "Un twist che lo renda interessante", type: "EM" }
      ]
    },
    {
      question: "Il tuo ruolo in un morning club?",
      answers: [
        { text: "Sempre in pista, non mi fermo", type: "ER" },
        { text: "Parlo con tutti, creo networking", type: "CS" },
        { text: "Ho appuntamento con troppe persone", type: "MP" },
        { text: "Mi rilasso, prevengo il burnout", type: "DZ" },
        { text: "Arrivo tardi, ma mi faccio notare", type: "EM" }
      ]
    },
    {
      question: "Come descriveresti il tuo weekend ideale?",
      answers: [
        { text: "Viaggio last minute in una capitale Europea", type: "ER" },
        { text: "Basta che ci sia almeno un aperitivo organizzato", type: "CS" },
        { text: "Weekend pianificato tra eventi e orari", type: "MP" },
        { text: "Relax e detox. Andiamo alle terme?", type: "DZ" },
        { text: "Niente di organizzato, ci piacciono le serate alternative", type: "EM" }
      ]
    }
  ];

  const resultsMap = {
    ER: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/espresso.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Espresso%20Raver.png"
      ],
      description: `Il Mood: "Il risveglio è il mio mainstage".
      
Descrizione: Trasformi le prime ore del giorno in un’esplosione di energia: il mondo si accende, la musica rimbomba nelle cuffie della tua playlist preferita e ogni passo ti carica. Non c’è tempo da perdere, solo ritmo da seguire. Con te non ci si annoia mai, ma meglio non parlarti prima del primo caffè.

Energia: 100% pura & senza compromessi. 
Green Flags:
-Sei l’amico che propone sempre qualcosa di nuovo da fare
-Sempre dritto al punto senza giri di parole
-Super produttivo
Red Flags:
-Impaziente cronico
-Rispondi “Ok” quando sei arrabbiato
-Giudichi chi dorme più di 7 ore
La tua combo: Espresso, Succo Ace & Cornetto vuoto`
    },
    CS: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/cappuccino.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Cappuccino%20Socializer.png"
      ],
      description: `Il Mood: "Il ritmo nasce dalla compagnia".
      
Descrizione: La tua energia nasce dall’interazione con gli altri: conversazioni, condivisioni di esperienze o il semplice stare in gruppo ti carica. Ogni sorso di caffè è un’occasione per scambiare idee, per te non c’è modo migliore di iniziare una bella giornata con una colazione tra amici. Non hai fretta di tuffarti nel caos quotidiano, preferisci goderti la schiuma della conversazione mentre il beat della giornata sale lentamente.

Energia: Parte al 30% per arrivare al 100% in serata
Green Flags:
-Empatico e sensibile
-Sempre aggiornato sui gossip
-Senza di te le serate non sono abbastanza spicy da essere raccontate
Red Flags:
-Logorroico
-Eterno indeciso
-Influenzabile dai giudizi degli altri
La tua combo: Cappuccino, Succo Pesca & Cornetto alla crema`
    },
    MP: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/macchiato.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Macchiato%20Performer.png"
      ],
      description: `Il Mood: "Sempre il Numero 1".
      
Descrizione: Ti piace dominare la scena, dirigere il ritmo e non lasciare nulla al caso. Non segui il flusso: lo detti. Quando entri in una stanza, si percepisce grazie alla tua leadership naturale. Sai essere dolce senza perdere la tua intensità, ma attenzione a pensare che siano tutti come te.

Energia: 80%
Green Flags:
-Equilibrato ma con carattere
-Responsabile e autonomo
-Feedback-friendly
Red Flags:
-Pretendi troppo
-Permaloso
-Tendi ad essere sempre al centro dell’attenzione

La tua combo: Caffè Macchiato, Succo Albicocca  & Cornetto al Cioccolato`
    },
    DZ: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/deca.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Deca%20Zen.png"
      ],
      description: `Il Mood: "Equilibrio ad ogni sorso".
      
Descrizione: Il mondo scorre intorno a lui, ma lui resta centrato. Il Deca Zen non rincorre la giornata, la accompagna. Il caffè è pure piacere, non una carica: equilibrio e armonia definiscono il suo ritmo. Non ci sono problemi che non puoi gestire o situazioni che non puoi controllare, tutto per te è semplice e inizia con un bel caffè Deca.

Energia: 50%
Green Flags:
-Non c’è nessuno meno stressato di te
-Hai una soluzione ad ogni problema, anche perché per te non esistono veri problemi
-Ottimista
Red Flags:
-Ritardatario cronico
-Superficiale
-Disorganizzato
La tua combo: Caffè Decaffeinato, Succo Mirtillo & Cornetto Cioccolato`
    },
    EM: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/martini.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Espresso%20Martini%20Nightrunner.png"
      ],
      description: `Il Mood: "La notte non finisce, evolve".
      
Descrizione: Per chi vive tra la notte e il mattino. L’Espresso Martini è il twist della giornata: non segue il flow, lo trasforma. Entri nel “Morning Club” con l’attitudine di chi ha già vissuto tutto — e ha ancora voglia di un ultimo giro. Niente può essere banale, ti piacciono le cose complesse e sfaccettate altrimenti per te non c’è sfida. Sei eclettico, ma spesso è difficile capirti.

Energia: 70%
Green Flags:
-Sognatore
-Raffinato e sempre all’ultima moda
-Originale
Red Flags:
-Ma quanto te la tiri
-Più complicato di un cubo di Rubik
-Misterioso fino alla fine

La tua combo: Espresso Martini & Toast`
    }
  };
    
   let userEmail = "";
  let currentQuestion = 0;
  let userAnswers = [];

  let scores = {
    ER: 0,
    CS: 0,
    MP: 0,
    DZ: 0,
    EM: 0
  };

  const quizContainer = document.getElementById("quiz-container");

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function startQuiz() {

    const email = document.getElementById("user-email").value.trim();

    const marketingChecked =
      document.getElementById("marketing-check").checked;

    const profilingChecked =
      document.getElementById("profiling-check").checked;

    const error = document.getElementById("email-error");

    if (!isValidEmail(email)) {
      error.textContent = "Inserisci una email valida.";
      return;
    }

    if (!marketingChecked || !profilingChecked) {
      error.textContent =
        "Devi accettare entrambi i consensi per continuare.";
      return;
    }

    userEmail = email;
    error.textContent = "";

    document.getElementById("email-step").style.display = "none";

    quizContainer.style.display = "block";

    renderQuestion();
  }

  function renderQuestion() {

    const q = questions[currentQuestion];

    const progressPercent =
      (currentQuestion / questions.length) * 100;

    quizContainer.innerHTML = `
      <div class="progress-wrap">

        <div class="progress-text">
          Domanda ${currentQuestion + 1} di ${questions.length}
        </div>

        <div class="progress-bar">
          <div class="progress"
            style="width:${progressPercent}%;">
          </div>
        </div>

      </div>

      <h2 class="question">${q.question}</h2>

      <div class="answers" id="answers-container"></div>
    `;

    const answersContainer =
      document.getElementById("answers-container");

    q.answers.forEach(answer => {

      const button = document.createElement("button");

      button.className = "answer-btn";

      button.textContent = answer.text;

      button.addEventListener("click", () =>
        selectAnswer(answer)
      );

      answersContainer.appendChild(button);

    });
  }

  function selectAnswer(answer) {

    scores[answer.type]++;

    userAnswers.push({
      question: questions[currentQuestion].question,
      answer: answer.text,
      personaCode: answer.type
    });

    currentQuestion++;

    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  function saveLead(finalType, resultName) {

    fetch(GOOGLE_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },

      body: JSON.stringify({
        email: userEmail,
        result: resultName,
        resultCode: finalType,
        marketingConsent: true,
        profilingConsent: true,
        answers: userAnswers
      })
    });
  }

  function showResult() {
  const finalType = Object.keys(scores).reduce((a, b) =>
    scores[a] >= scores[b] ? a : b
  );

  const result = resultsMap[finalType];

  const resultName = result.name || finalType;
  const resultImages = result.images || result.image;

  saveLead(finalType, resultName);

  quizContainer.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-text">Quiz completato</div>
      <div class="progress-bar">
        <div class="progress" style="width:100%;"></div>
      </div>
    </div>

    <div class="result">
      <div class="result-badge">Risultato finale</div>

      <div class="result-images">
        <img src="${resultImages[0]}" class="result-image" alt="${resultName}" />
        <img src="${resultImages[1]}" class="result-image" alt="${resultName}" />
      </div>

      <p class="result-description">${result.description}</p>

      <button class="restart-btn" onclick="restartQuiz()">Ricomincia il quiz</button>
    </div>
  `;
}
  function restartQuiz() {

    currentQuestion = 0;

    userAnswers = [];

    scores = {
      ER: 0,
      CS: 0,
      MP: 0,
      DZ: 0,
      EM: 0
    };

    document.getElementById("email-step").style.display = "block";

    quizContainer.style.display = "none";

    quizContainer.innerHTML = "";
  }
</script>
</body>
</html>
