<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Personas Quiz</title>

  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background-image: url("https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/refs/heads/main/sfondo.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: #6f4e37;
}

.app {
  width: 100%;
  max-width: 820px;
  background: rgba(255, 250, 246, 0.85); /* Colore del box con trasparenza */
  border-radius: 24px;
  padding: 32px;
  box-shadow: 0 20px 50px rgba(59, 36, 23, 0.15);
}

.title {
  font-size: 2rem;
  margin-bottom: 10px;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-weight: bold;
}

.subtitle {
  text-align: center;
  color: #6f4e37; 
  margin-bottom: 28px;
  line-height: 1.5;
  font-family: 'Poppins', sans-serif;
}

.email-box {
  display: grid;
  gap: 14px;
}

.email-input {
  width: 100%;
  border: 1px solid #e0cbbb;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 1rem;
  color: #3b2417;
  background: #fff;
}

.privacy-label {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 0.9rem;
  line-height: 1.4;
  color: #6a4a3a;
}

.start-btn,
.answer-btn,
.restart-btn {
  border: none;
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.25s ease;
}

.start-btn,
.restart-btn {
  background: #6f4e37;
  color: white;
  width: 100%;
}

.start-btn:hover,
.restart-btn:hover {
  background: #5b3f2c;
  transform: translateY(-2px);
}

.progress-wrap {
  margin-bottom: 24px;
}

.progress-text {
  font-size: 0.95rem;
  margin-bottom: 8px;
  color: #6a4a3a;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #ead9cc;
  border-radius: 999px;
  overflow: hidden;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #6f4e37, #b57b55);
  transition: width 0.3s ease;
}

.question {
  font-size: 1.4rem;
  margin-bottom: 22px;
  line-height: 1.4;
}

.answers {
  display: grid;
  gap: 14px;
}

.answer-btn {
  background: #f3e6dc;
  color: #3b2417;
  text-align: left;
}

.answer-btn:hover {
  background: #e8d2c1;
  transform: translateY(-2px);
}

.result-badge {
  display: inline-block;
  margin-bottom: 16px;
  padding: 8px 14px;
  border-radius: 999px;
  background: #f0dfd2;
  color: #6f4e37;
  font-weight: bold;
}

.result-title {
  font-size: 2rem;
  margin-bottom: 16px;
}

.result-description {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #5c4033;
  margin-bottom: 24px;
  white-space: pre-line;
  text-align: left;
}

.result-image {
  width: 100%;
  max-width: 200px;
  margin-bottom: 16px;
}

.error-message {
  color: #9b2c2c;
  font-size: 0.9rem;
  text-align: center;
}

.footer-note {
  margin-top: 20px;
  text-align: center;
  font-size: 0.9rem;
  color: #7b6253;
}

@media (max-width: 640px) {
  .app {
    padding: 24px 18px;
  }

  .title {
    font-size: 1.7rem;
  }

  .question {
    font-size: 1.2rem;
  }

  .result-title {
    font-size: 1.6rem;
  }

  .result-description {
    font-size: 0.98rem;
  }
}
  </style>
</head>

<body>
  <div class="app">
    <h1 class="title">Coffee Personas</h1>
    <p class="subtitle">
     Enter your email, answer the 5 questions, and discover which coffee persona you are.
    </p>

    <div id="email-step">
      <div class="email-box">
        <input
          type="email"
          id="user-email"
          class="email-input"
          placeholder="Inserisci la tua email"
        />

       <div class="privacy-box">
  <p>Pursuant to Articles 6–8 of Regulation (EU) 2016/679</p>

  <label class="privacy-label">
    <input type="checkbox" id="marketing-check" />
    <span>
    I authorize the processing of my personal data for the promotion and sale of products and services, 
    the sending of commercial information, marketing activities, and the measurement of customer satisfaction.
    </span>
  </label>

  <label class="privacy-label">
    <input type="checkbox" id="profiling-check" />
    <span>
      I authorize the profiling of activities and specific interests related to the communications sent,
      in order to provide targeted commercial offers and analysis reports.
    </span>
  </label>

  <p class="privacy-small">
To read the full privacy notice on marketing activities
    <a href="https://vergnano1882.sharepoint.com/:w:/r/Shared%20Documents/informativa%20attivit%C3%A0%20di%20marketing.docx?d=w419fd2e5fd8e4fb292bc37df55b0ca2f&csf=1&web=1&e=aUnSCa" target="_blank">
      clicca qui
    </a>.
  </p>
</div>

        <button class="start-btn" onclick="startQuiz()">Inizia il quiz</button>
        <p id="email-error" class="error-message"></p>
      </div>
    </div>

    <div id="quiz-container" style="display: none;"></div>
  </div>

  <script>
  const GOOGLE_ENDPOINT = "https://script.google.com/macros/s/AKfycbz593S16u5dnmg-LD37KmelT_MKuXzhq8tmkAOXKRJH_GjuSBrXgQ3Uwv7hLle5ERqT/exec";

  const questions = [
    {
      question: "How do you start your day?",
      answers: [
        { text: "The alarm goes off and I’m instantly active, no waiting around.", type: "ER" },
        { text: "Slowly, maybe chatting or waiting for the next alarm to snooze.", type: "CS" },
        { text: "I plan everything; I want to perform at my best.", type: "MP" },
        { text: "Slow and mindful, with a nice breakfast waiting for me.", type: "DZ" },
        { text: "I haven’t stopped since the night before.", type: "EM" }
      ]
    },
    {
      question: "Choose a music vibe",
      answers: [
        { text: "Rock", type: "ER" },
        { text: "Reggaeton e Latin", type: "CS" },
        { text: "Pop and contemporary", type: "MP" },
        { text: "Indie", type: "DZ" },
        { text: "Electronic music", type: "EM" }
      ]
    },
    {
      question: "What are you looking for in your coffee?",
      answers: [
        { text: "Immediate energy", type: "ER" },
        { text: "Social ritual", type: "CS" },
        { text: "Bold taste and strong flavors", type: "MP" },
        { text: "A moment of relaxation", type: "DZ" },
        { text: "A twist that makes it interesting", type: "EM" }
      ]
    },
    {
      question: "What’s your role in a morning club?",
      answers: [
        { text: "Always on the move, I never stop.", type: "ER" },
        { text: "I talk to everyone and build connections.", type: "CS" },
        { text: "I have appointments with too many people.", type: "MP" },
        { text: "I relax and prevent burnout.", type: "DZ" },
        { text: "I arrive late, but I make sure I get noticed.", type: "EM" }
      ]
    },
    {
      question: "How would you describe your ideal weekend?",
      answers: [
        { text: "A last-minute trip to a European capital", type: "ER" },
        { text: "As long as there’s at least one aperitivo planned", type: "CS" },
        { text: "A weekend planned around events and schedules", type: "MP" },
        { text: "Relax and detox. Shall we go to the spa?", type: "DZ" },
        { text: "Nothing planned, we like alternative nights out.", type: "EM" }
      ]
    }
  ];

  const resultsMap = {
    ER: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/espresso.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Espresso%20Raver.png"
      ],
      description: `The Mood: “Waking up is my mainstage".
      
Description: You turn the first hours of the day into an explosion of energy: the world lights up, music blasts through the headphones of your favorite playlist, and every step charges you up. There’s no time to waste, only a rhythm to follow. With you, things are never boring, but it’s better not to talk to you before your first coffee.

Energy: 100% pure & uncompromising.

Green Flags:

* You’re the friend who always suggests something new to do
* Always straight to the point, no beating around the bush
* Super productive

Red Flags:

* Chronically impatient
* You reply “Ok” when you’re angry
* You judge anyone who sleeps more than 7 hours

Your combo: Espresso, ACE juice & plain croissant`
    },
    CS: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/cappuccino.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Cappuccino%20Socializer.png"
      ],
      description: `The Mood: “The rhythm starts with good company".
      
Description: Your energy comes from interacting with others: conversations, shared experiences, or simply being with a group charge you up. Every sip of coffee is a chance to exchange ideas. For you, there’s no better way to start a good day than with breakfast among friends. You’re in no rush to dive into the daily chaos; you prefer to enjoy the foam of conversation while the beat of the day slowly builds.

Energy: Starts at 30% and reaches 100% by the evening.

Green Flags:

* Empathetic and sensitive
* Always up to date on the latest gossip
* Without you, nights out aren’t spicy enough to be worth telling

Red Flags:

* Talkative
* Eternally indecisive
* Easily influenced by other people’s opinions

Your combo: Cappuccino, peach juice & custard croissant`
    },
    MP: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/macchiato.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Macchiato%20Performer.png"
      ],
      description: `The Mood: “Always Number 1”
      
Description: You like to own the scene, set the rhythm, and leave nothing to chance. You don’t follow the flow: you create it. When you walk into a room, people feel it thanks to your natural leadership. You know how to be sweet without losing your intensity, but be careful not to assume everyone is like you.

Energy: 80%

Green Flags:

* Balanced, but with character
* Responsible and independent
* Feedback-friendly

Red Flags:

* You expect too much
* Touchy
* You tend to always be at the center of attention

Your combo: Caffè macchiato, apricot juice & chocolate croissant`
    },
    DZ: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/deca.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Deca%20Zen.png"
      ],
      description: `The Mood: “Balance in every sip".
      
Description: The world moves around him, but he stays centered. Deca Zen doesn’t chase the day; he moves with it. Coffee is pure pleasure, not a boost: balance and harmony define his rhythm. There are no problems you can’t handle or situations you can’t control; everything feels simple to you and starts with a nice decaf coffee.

Energy: 50%

Green Flags:

* No one is less stressed than you
* You have a solution for every problem, also because for you, real problems don’t exist
* Optimistic

Red Flags:

* Chronically late
* Superficial
* Disorganized

Your combo: Decaf coffee, blueberry juice & chocolate croissant`
    },
    EM: {
      image: [
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/martini.png",
        "https://raw.githubusercontent.com/CaffeVergnano/SoftClubbing-/main/Espresso%20Martini%20Nightrunner.png"
      ],
      description: `The Mood: “The night doesn’t end, it evolves".
      
Description: For those who live between night and morning. The Espresso Martini is the twist of the day: it doesn’t follow the flow, it transforms it. You enter the “Morning Club” with the attitude of someone who has already experienced it all — and still wants one last round. Nothing can be ordinary; you like things that are complex and multi-layered, otherwise there’s no challenge for you. You’re eclectic, but often hard to understand.

Energy: 70%

Green Flags:

* Dreamer
* Sophisticated and always on trend
* Original

Red Flags:

* Wow, you really do love showing off
* More complicated than a Rubik’s Cube
* Mysterious until the very end

Your combo: Espresso Martini & toast`
    }
  };
    
   let userEmail = "";
  let currentQuestion = 0;
  let userAnswers = [];

  let scores = {
    ER: 0,
    CS: 0,
    MP: 0,
    DZ: 0,
    EM: 0
  };

  const quizContainer = document.getElementById("quiz-container");

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function startQuiz() {

    const email = document.getElementById("user-email").value.trim();

    const marketingChecked =
      document.getElementById("marketing-check").checked;

    const profilingChecked =
      document.getElementById("profiling-check").checked;

    const error = document.getElementById("email-error");

    if (!isValidEmail(email)) {
      error.textContent = "Inserisci una email valida.";
      return;
    }

    if (!marketingChecked || !profilingChecked) {
      error.textContent =
        "Devi accettare entrambi i consensi per continuare.";
      return;
    }

    userEmail = email;
    error.textContent = "";

    document.getElementById("email-step").style.display = "none";

    quizContainer.style.display = "block";

    renderQuestion();
  }

  function renderQuestion() {

    const q = questions[currentQuestion];

    const progressPercent =
      (currentQuestion / questions.length) * 100;

    quizContainer.innerHTML = `
      <div class="progress-wrap">

        <div class="progress-text">
          Domanda ${currentQuestion + 1} di ${questions.length}
        </div>

        <div class="progress-bar">
          <div class="progress"
            style="width:${progressPercent}%;">
          </div>
        </div>

      </div>

      <h2 class="question">${q.question}</h2>

      <div class="answers" id="answers-container"></div>
    `;

    const answersContainer =
      document.getElementById("answers-container");

    q.answers.forEach(answer => {

      const button = document.createElement("button");

      button.className = "answer-btn";

      button.textContent = answer.text;

      button.addEventListener("click", () =>
        selectAnswer(answer)
      );

      answersContainer.appendChild(button);

    });
  }

  function selectAnswer(answer) {

    scores[answer.type]++;

    userAnswers.push({
      question: questions[currentQuestion].question,
      answer: answer.text,
      personaCode: answer.type
    });

    currentQuestion++;

    if (currentQuestion < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  function saveLead(finalType, resultName) {

    fetch(GOOGLE_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },

      body: JSON.stringify({
        email: userEmail,
        result: resultName,
        resultCode: finalType,
        marketingConsent: true,
        profilingConsent: true,
        answers: userAnswers
      })
    });
  }

  function showResult() {
  const finalType = Object.keys(scores).reduce((a, b) =>
    scores[a] >= scores[b] ? a : b
  );

  const result = resultsMap[finalType];

  const resultName = result.name || finalType;
  const resultImages = result.images || result.image;

  saveLead(finalType, resultName);

  quizContainer.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-text">Quiz completato</div>
      <div class="progress-bar">
        <div class="progress" style="width:100%;"></div>
      </div>
    </div>

    <div class="result">
      <div class="result-badge">Risultato finale</div>

      <div class="result-images">
        <img src="${resultImages[0]}" class="result-image" alt="${resultName}" />
        <img src="${resultImages[1]}" class="result-image" alt="${resultName}" />
      </div>

      <p class="result-description">${result.description}</p>

      <button class="restart-btn" onclick="restartQuiz()">Ricomincia il quiz</button>
    </div>
  `;
}
  function restartQuiz() {

    currentQuestion = 0;

    userAnswers = [];

    scores = {
      ER: 0,
      CS: 0,
      MP: 0,
      DZ: 0,
      EM: 0
    };

    document.getElementById("email-step").style.display = "block";

    quizContainer.style.display = "none";

    quizContainer.innerHTML = "";
  }
</script>
</body>
</html>
